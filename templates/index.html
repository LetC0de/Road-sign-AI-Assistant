<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Sign Assistant</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

<div class="container">

    <!-- Header -->
    <h1>🚦 Traffic Sign Assistant</h1>

    <!-- Output Box -->
    <div class="output-box" id="outputBox">
        <p class="placeholder">LLM response will appear here...</p>
    </div>

    <!-- Input Section -->
    <div class="input-section">

        <!-- Upload Button -->
        <label for="imageUpload" class="upload-btn">📷</label>
        <input type="file" id="imageUpload" hidden>

        <!-- Text Input -->
        <input type="text" id="userInput" placeholder="Enter image path or query...">

        <!-- Send Button -->
        <button id="sendBtn">Send ➤</button>

    </div>

</div>

</body>
</html>
